<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#f8fafc" />
  <meta name="color-scheme" content="light" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Gestor Base" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png" />
  <title>Gestor de base móvil</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #f8fafc;
      --card: #ffffff;
      --muted: #64748b;
      --text: #0f172a;
      --line: #e2e8f0;
      --soft: #f1f5f9;
      --blue-soft: #eff6ff;
      --green-soft: #ecfdf5;
      --violet-soft: #f5f3ff;
      --shadow: 0 4px 20px rgba(15, 23, 42, 0.05);
      --shadow-strong: 0 18px 48px rgba(15, 23, 42, 0.18);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 18px;
      --radius-sm: 14px;
    }

    * { box-sizing: border-box; }
    html {
      color-scheme: light;
      -webkit-text-size-adjust: 100%;
      touch-action: manipulation;
      overscroll-behavior: none;
      scroll-behavior: smooth;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      min-height: 100vh;
    }
    input, select, textarea, button {
      font: inherit;
      font-size: 16px;
    }
    button { cursor: pointer; }

    .app {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100vh;
      padding: 24px 16px 110px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 18px;
    }
    .eyebrow {
      font-size: 11px;
      letter-spacing: .22em;
      text-transform: uppercase;
      font-weight: 700;
      color: #94a3b8;
    }
    .title {
      margin: 8px 0 4px;
      font-size: 30px;
      line-height: 1.05;
      letter-spacing: -0.03em;
      font-weight: 700;
    }
    .subtitle {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .icon-btn {
      width: 48px;
      height: 48px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: var(--card);
      box-shadow: var(--shadow);
      display: grid;
      place-items: center;
      color: #334155;
      flex: 0 0 auto;
    }

    .toast {
      display: none;
      margin-bottom: 16px;
      padding: 14px 16px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: var(--card);
      box-shadow: var(--shadow);
      color: #334155;
      font-size: 14px;
    }
    .toast.show { display: block; }

    .screen { display: none; }
    .screen.active { display: block; }

    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      padding: 16px;
    }
    .card + .card { margin-top: 14px; }

    .section-head {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .section-icon {
      width: 44px;
      height: 44px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      font-size: 19px;
      color: #334155;
    }
    .blue { background: var(--blue-soft); }
    .green { background: var(--green-soft); }
    .violet { background: var(--violet-soft); }
    .section-title {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
    }
    .section-subtitle {
      margin: 3px 0 0;
      font-size: 12px;
      color: var(--muted);
    }

    form { margin: 0; }
    .field { margin-bottom: 14px; }
    .field:last-child { margin-bottom: 0; }
    .field label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .input, .select, .textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--soft);
      border-radius: 18px;
      color: var(--text);
      outline: none;
      transition: .2s ease;
    }
    .input, .select {
      height: 48px;
      padding: 0 14px;
    }
    .textarea {
      min-height: 96px;
      resize: vertical;
      padding: 14px;
    }
    .input:focus, .select:focus, .textarea:focus {
      border-color: #cbd5e1;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(226,232,240,.85);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .info-box {
      background: var(--soft);
      border-radius: 18px;
      padding: 12px 14px;
      font-size: 12px;
      line-height: 1.6;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .btn {
      height: 48px;
      border: none;
      border-radius: 18px;
      padding: 0 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-weight: 600;
      transition: transform .12s ease, opacity .2s ease, background .2s ease;
    }
    .btn:active { transform: scale(.99); }
    .btn-primary {
      width: 100%;
      background: #0f172a;
      color: #fff;
      box-shadow: var(--shadow);
    }
    .btn-secondary {
      background: #fff;
      color: #334155;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      width: 100%;
    }
    .btn-danger {
      background: #fff;
      color: #dc2626;
      border: 1px solid #fecaca;
      box-shadow: var(--shadow);
      width: 100%;
    }

    .clients-search {
      margin-bottom: 14px;
    }
    .search-wrap {
      position: relative;
    }
    .search-wrap .input {
      padding-left: 42px;
      padding-right: 14px;
    }
    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 15px;
      color: #94a3b8;
      pointer-events: none;
    }
    .search-info {
      margin: 8px 4px 0;
      font-size: 12px;
      color: var(--muted);
    }

    .client-list { display: grid; gap: 12px; }
    .client-item {
      background: var(--soft);
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 14px;
    }
    .pill-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      padding: 0 10px;
      border-radius: 999px;
      background: #fff;
      box-shadow: var(--shadow);
      font-size: 11px;
      font-weight: 700;
      color: #475569;
    }
    .client-name {
      margin: 12px 0 4px;
      font-size: 14px;
      font-weight: 700;
    }
    .client-meta, .client-address, .client-class {
      margin: 0;
      font-size: 12px;
      line-height: 1.55;
      color: var(--muted);
    }
    .client-address { margin-top: 7px; }
    .client-class { margin-top: 8px; font-weight: 600; color: #475569; }
    .client-actions {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }
    .client-actions .btn {
      width: auto;
      min-width: 0;
      height: 34px;
      padding: 0 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 600;
      box-shadow: none;
    }

    .stats { display: grid; gap: 12px; }
    .stat-box {
      background: var(--soft);
      border-radius: 24px;
      padding: 14px;
    }
    .stat-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .08em;
      font-weight: 700;
    }
    .stat-number {
      margin-top: 8px;
      font-size: 34px;
      font-weight: 700;
      letter-spacing: -0.04em;
    }
    .route-list {
      margin-top: 12px;
      display: grid;
      gap: 8px;
    }
    .route-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      background: #fff;
      padding: 10px 12px;
      border-radius: 18px;
      box-shadow: var(--shadow);
      font-size: 14px;
    }
    .route-item strong { font-size: 15px; }

    .bottom-nav {
      position: fixed;
      left: 0;
      right: 0;
      bottom: 0;
      border-top: 1px solid var(--line);
      background: rgba(255,255,255,.95);
      backdrop-filter: blur(14px);
      z-index: 30;
    }
    .bottom-nav-inner {
      max-width: 430px;
      margin: 0 auto;
      padding: 12px 16px;
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    .nav-btn {
      border: none;
      border-radius: 18px;
      height: 46px;
      font-size: 12px;
      font-weight: 700;
      color: #64748b;
      background: #f1f5f9;
      transition: .2s ease;
    }
    .nav-btn.active {
      background: #0f172a;
      color: #fff;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(6px);
      display: none;
      align-items: flex-end;
      justify-content: center;
      padding: 12px;
      z-index: 80;
    }
    .modal.show { display: flex; }
    .modal-box {
      width: 100%;
      max-width: 430px;
      border-radius: 28px;
      border: 1px solid var(--line);
      background: #fff;
      box-shadow: var(--shadow-strong);
      padding: 18px;
      max-height: min(85vh, 780px);
      overflow: auto;
    }
    .modal-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 14px;
    }
    .modal-title {
      margin: 0;
      font-size: 19px;
      font-weight: 700;
    }
    .modal-subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }
    .close-btn {
      border: none;
      background: var(--soft);
      color: #475569;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
    }

    .settings-options { display: grid; gap: 10px; }
    .option-card {
      width: 100%;
      background: #fff;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      border-radius: 24px;
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      text-align: left;
    }
    .option-icon {
      width: 46px;
      height: 46px;
      border-radius: 18px;
      display: grid;
      place-items: center;
      font-size: 18px;
      color: #334155;
      flex: 0 0 auto;
    }
    .option-body {
      min-width: 0;
      flex: 1;
    }
    .option-title {
      font-size: 15px;
      font-weight: 700;
      margin: 0 0 2px;
    }
    .option-desc {
      margin: 0;
      font-size: 12px;
      line-height: 1.5;
      color: var(--muted);
    }
    .arrow { color: #94a3b8; font-size: 18px; }

    .upload-box {
      border: 1px dashed #cbd5e1;
      background: var(--soft);
      border-radius: 28px;
      padding: 26px 16px;
      text-align: center;
    }
    .upload-box .upload-icon {
      font-size: 28px;
      margin-bottom: 8px;
    }
    .upload-box p {
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    @media (min-width: 640px) {
      .modal { align-items: center; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div>
        <div class="eyebrow">Gestión</div>
        <h1 class="title">Gestor de base móvil</h1>
        <p class="subtitle">Gestión de datos conectada a Google Sheets.</p>
      </div>
      <button class="icon-btn" id="openSettingsBtn" aria-label="Abrir configuración">⚙️</button>
    </header>

    <div class="toast" id="toast"></div>

    <main>
      <section class="screen active" id="screen-registro">
        <div class="card">
          <div class="section-head">
            <div class="section-icon blue">＋</div>
            <div>
              <h2 class="section-title">Agregar cliente</h2>
            </div>
          </div>

          <form id="addClientForm">
            <div class="field">
              <label for="codigo"># Código</label>
              <input class="input" id="codigo" name="codigo" placeholder="Ej. 1132706" inputmode="numeric" />
            </div>

            <div class="grid-2">
              <div class="field">
                <label for="ruta">📍 Ruta</label>
                <input class="input" id="ruta" name="ruta" placeholder="Ej. 17029" />
              </div>
              <div class="field">
                <label for="dia_visita">📅 Día visita</label>
                <select class="select" id="dia_visita" name="dia_visita">
                  <option value="1-Lunes">1-Lunes</option>
                  <option value="2-Martes">2-Martes</option>
                  <option value="3-Miércoles">3-Miércoles</option>
                  <option value="4-Jueves">4-Jueves</option>
                  <option value="5-Viernes">5-Viernes</option>
                  <option value="6-Sábado">6-Sábado</option>
                  <option value="7-Domingo">7-Domingo</option>
                </select>
              </div>
            </div>

            <div class="field">
              <label for="nombre_negocio">🏪 Nombre Negocio</label>
              <input class="input" id="nombre_negocio" name="nombre_negocio" placeholder="Ej. SUPER 24 SANARATE CENTRO" />
            </div>

            <div class="field">
              <label for="direccion">🏢 Dirección</label>
              <textarea class="textarea" id="direccion" name="direccion" placeholder="Dirección"></textarea>
            </div>

            <div class="field">
              <label for="clasificacion">🏷 Clasificación PDV</label>
              <input class="input" id="clasificacion" name="clasificacion" placeholder="Ej. A" />
            </div>

            <div class="info-box">
              Usa valores por defecto.
            </div>

            <button type="submit" class="btn btn-primary">💾 AGREGAR</button>
          </form>
        </div>
      </section>

      <section class="screen" id="screen-clientes">
        <div class="card">
          <div class="section-head">
            <div class="section-icon green">👥</div>
            <div>
              <h2 class="section-title">Clientes</h2>
            </div>
          </div>

          <div class="clients-search">
            <div class="search-wrap">
              <span class="search-icon">🔎</span>
              <input class="input" id="clientSearchInput" type="search" placeholder="Buscar por nombre, código o día" autocomplete="off" />
            </div>
            <div class="search-info" id="clientSearchInfo">Todos los clientes</div>
          </div>

          <div class="client-list" id="clientList"></div>
        </div>
      </section>

      <section class="screen" id="screen-vista">
        <div class="card">
          <div class="section-head">
            <div class="section-icon violet">📊</div>
            <div>
              <h2 class="section-title">Resumen</h2>
            </div>
          </div>

          <div class="stats">
            <div class="stat-box">
              <div class="stat-label">Total clientes</div>
              <div class="stat-number" id="totalClientes">0</div>
            </div>

            <div class="stat-box">
              <div class="stat-label">Nuevos del mes</div>
              <div class="stat-number" id="nuevosMes">0</div>
            </div>

            <div class="stat-box">
              <div class="stat-label">Por ruta</div>
              <div class="route-list" id="routeList"></div>
            </div>
          </div>

          <button class="btn btn-primary" style="margin-top:16px;" id="exportExcelBtn">📄 Exportar Excel</button>
        </div>
      </section>
    </main>
  </div>

  <nav class="bottom-nav">
    <div class="bottom-nav-inner">
      <button class="nav-btn active" data-tab="registro">Agregar cliente</button>
      <button class="nav-btn" data-tab="clientes">Clientes</button>
      <button class="nav-btn" data-tab="vista">Resumen</button>
    </div>
  </nav>

  <div class="modal" id="settingsModal">
    <div class="modal-box">
      <div class="modal-head">
        <div>
          <h3 class="modal-title">Configuración</h3>
        </div>
        <button class="close-btn" data-close="settingsModal">Cerrar</button>
      </div>

      <div class="settings-options">
        <button class="option-card" id="openUserModalBtn">
          <div class="option-icon blue">👤</div>
          <div class="option-body">
            <div class="option-title">Usuario</div>
            <p class="option-desc">Datos por defecto conectados a Sheets.</p>
          </div>
          <div class="arrow">›</div>
        </button>
      </div>
    </div>
  </div>

  <div class="modal" id="userModal">
    <div class="modal-box">
      <div class="modal-head">
        <div>
          <h3 class="modal-title">Usuario</h3>
        </div>
        <button class="close-btn" data-close="userModal">Cerrar</button>
      </div>

      <form id="userForm">
        <div class="field">
          <label for="user_centro">🏢 Centro</label>
          <input class="input" id="user_centro" name="centro" />
        </div>
        <div class="field">
          <label for="user_agencia">📍 Agencia</label>
          <input class="input" id="user_agencia" name="agencia" />
        </div>
        <div class="field">
          <label for="user_distrito">🧾 Distrito</label>
          <input class="input" id="user_distrito" name="distrito" />
        </div>
        <div class="field">
          <label for="user_promotora">👤 Promotora</label>
          <input class="input" id="user_promotora" name="promotora" />
        </div>
        <button class="btn btn-primary" type="submit">💾 Guardar</button>
      </form>
    </div>
  </div>

  <div class="modal" id="editModal">
    <div class="modal-box">
      <div class="modal-head">
        <div>
          <h3 class="modal-title">Editar cliente</h3>
        </div>
        <button class="close-btn" data-close="editModal">Cerrar</button>
      </div>

      <form id="editForm">
        <input type="hidden" id="edit_id" />
        <div class="field">
          <label for="edit_codigo"># Código</label>
          <input class="input" id="edit_codigo" />
        </div>
        <div class="grid-2">
          <div class="field">
            <label for="edit_ruta">📍 Ruta</label>
            <input class="input" id="edit_ruta" />
          </div>
          <div class="field">
            <label for="edit_dia_visita">📅 Día visita</label>
            <select class="select" id="edit_dia_visita">
              <option value="1-Lunes">1-Lunes</option>
              <option value="2-Martes">2-Martes</option>
              <option value="3-Miércoles">3-Miércoles</option>
              <option value="4-Jueves">4-Jueves</option>
              <option value="5-Viernes">5-Viernes</option>
              <option value="6-Sábado">6-Sábado</option>
              <option value="7-Domingo">7-Domingo</option>
            </select>
          </div>
        </div>
        <div class="field">
          <label for="edit_nombre_negocio">🏪 Nombre Negocio</label>
          <input class="input" id="edit_nombre_negocio" />
        </div>
        <div class="field">
          <label for="edit_direccion">🏢 Dirección</label>
          <textarea class="textarea" id="edit_direccion"></textarea>
        </div>
        <div class="field">
          <label for="edit_clasificacion">🏷 Clasificación PDV</label>
          <input class="input" id="edit_clasificacion" />
        </div>
        <div class="grid-2">
          <button class="btn btn-primary" type="submit">💾 Guardar</button>
          <button class="btn btn-danger" type="button" id="deleteClientBtn">🗑 Borrar</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const APP_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwptPC80lyu_i6nM3eDqavkLrnVRQNGCKWmfecyqL-5mJAuE4DkR_dETXRIQT-Uc7o/exec";
    const CACHE_KEYS = {
      clients: "gestor_base_cache_clients_v1",
      userDefaults: "gestor_base_cache_user_defaults_v1",
      lastSync: "gestor_base_cache_last_sync_v1"
    };

    const DAYS = [
      "1-Lunes",
      "2-Martes",
      "3-Miércoles",
      "4-Jueves",
      "5-Viernes",
      "6-Sábado",
      "7-Domingo"
    ];

    const DEFAULT_USER = {
      centro: "",
      agencia: "",
      distrito: "",
      promotora: ""
    };

    const REQUIRED_EXPORT_COLUMNS = [
      "Codigo",
      "Centro",
      "Agencia",
      "Distrito",
      "Ruta",
      "Dia_visita",
      "Orden",
      "Nombre_Negocio",
      "Direccion",
      "Clasificacion",
      "Promotora"
    ];

    let state = {
      activeTab: "registro",
      userDefaults: { ...DEFAULT_USER },
      clients: [],
      editId: null,
      clientSearch: "",
      loading: false
    };

    const toast = document.getElementById("toast");
    const clientList = document.getElementById("clientList");
    const clientSearchInput = document.getElementById("clientSearchInput");
    const clientSearchInfo = document.getElementById("clientSearchInfo");
    const routeList = document.getElementById("routeList");
    const totalClientesEl = document.getElementById("totalClientes");
    const nuevosMesEl = document.getElementById("nuevosMes");
    const addClientForm = document.getElementById("addClientForm");
    const editForm = document.getElementById("editForm");
    const exportExcelBtn = document.getElementById("exportExcelBtn");

    function normalizeText(value) {
      return String(value ?? "").trim();
    }

    function makeId() {
      return `${Date.now()}_${Math.random().toString(36).slice(2, 9)}`;
    }

    function normalizeBoolean(value) {
      return value === true || String(value).toLowerCase() === "true" || String(value) === "1";
    }

    function normalizeClient(raw) {
      return {
        id: raw.id || makeId(),
        codigo: normalizeText(raw.codigo || raw["Codigo Simple"] || raw.Codigo),
        centro: normalizeText(raw.centro || raw["Centro"] || raw.Centro),
        agencia: normalizeText(raw.agencia || raw["Agencia Actual"] || raw.Agencia),
        distrito: normalizeText(raw.distrito || raw["Distrito"] || raw.Distrito),
        ruta: normalizeText(raw.ruta || raw["Ruta Actual"] || raw.Ruta),
        dia_visita: normalizeText(raw.dia_visita || raw["Dia visita"] || raw.Dia_visita),
        orden: Number(raw.orden || raw["Orden"] || raw.Orden || 0),
        nombre_negocio: normalizeText(raw.nombre_negocio || raw["Nombre Negocio"] || raw.Nombre_Negocio),
        direccion: normalizeText(raw.direccion || raw["Direccion"] || raw.Direccion),
        clasificacion: normalizeText(raw.clasificacion || raw["Clasificacion PDV"] || raw.Clasificacion),
        promotora: normalizeText(raw.promotora || raw["Nombre promotora Visibilidad"] || raw.Promotora),
        createdAt: raw.createdAt || new Date().toISOString(),
        isNew: normalizeBoolean(raw.isNew)
      };
    }

    function sortAndRecalculateOrders(clients) {
      const grouped = new Map();

      clients.forEach((item) => {
        const ruta = normalizeText(item.ruta);
        if (!grouped.has(ruta)) grouped.set(ruta, []);
        grouped.get(ruta).push({ ...item });
      });

      const routeKeys = Array.from(grouped.keys()).sort((a, b) => a.localeCompare(b, undefined, { numeric: true }));
      const result = [];

      routeKeys.forEach((ruta) => {
        const routeItems = grouped.get(ruta).sort((a, b) => {
          const oa = Number(a.orden || 0);
          const ob = Number(b.orden || 0);
          if (oa !== ob) return oa - ob;
          return a.nombre_negocio.localeCompare(b.nombre_negocio);
        });

        routeItems.forEach((item, index) => {
          result.push({ ...item, ruta, orden: index + 1 });
        });
      });

      return result;
    }

    function saveCache() {
      try {
        localStorage.setItem(CACHE_KEYS.clients, JSON.stringify(state.clients));
        localStorage.setItem(CACHE_KEYS.userDefaults, JSON.stringify(state.userDefaults));
        localStorage.setItem(CACHE_KEYS.lastSync, new Date().toISOString());
      } catch (error) {
        console.warn("No se pudo guardar caché local", error);
      }
    }

    function loadCache() {
      try {
        const cachedClientsRaw = localStorage.getItem(CACHE_KEYS.clients);
        const cachedUserRaw = localStorage.getItem(CACHE_KEYS.userDefaults);

        const cachedClients = cachedClientsRaw ? JSON.parse(cachedClientsRaw) : [];
        const cachedUserDefaults = cachedUserRaw ? JSON.parse(cachedUserRaw) : null;

        if (Array.isArray(cachedClients) && cachedClients.length) {
          state.clients = sortAndRecalculateOrders(cachedClients.map(normalizeClient));
        }

        if (cachedUserDefaults && typeof cachedUserDefaults === "object") {
          state.userDefaults = { ...DEFAULT_USER, ...cachedUserDefaults };
        }

        return Boolean(
          (Array.isArray(cachedClients) && cachedClients.length) ||
          (cachedUserDefaults && typeof cachedUserDefaults === "object")
        );
      } catch (error) {
        console.warn("No se pudo leer caché local", error);
        return false;
      }
    }

    async function apiGet(action = "list") {
      if (!APP_SCRIPT_URL || APP_SCRIPT_URL.includes("PEGA_AQUI")) {
        throw new Error("Falta pegar la URL del Apps Script");
      }

      const url = `${APP_SCRIPT_URL}?action=${encodeURIComponent(action)}`;
      const response = await fetch(url, { method: "GET" });
      if (!response.ok) throw new Error("No se pudo leer Google Sheets");
      const json = await response.json();
      if (!json.ok) throw new Error(json.message || "Error de lectura");
      return json.data;
    }

    async function apiPost(payload) {
      if (!APP_SCRIPT_URL || APP_SCRIPT_URL.includes("PEGA_AQUI")) {
        throw new Error("Falta pegar la URL del Apps Script");
      }

      const response = await fetch(APP_SCRIPT_URL, {
        method: "POST",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(payload)
      });

      if (!response.ok) throw new Error("No se pudo guardar en Google Sheets");
      const json = await response.json();
      if (!json.ok) throw new Error(json.message || "Error al guardar");
      return json.data;
    }

    async function loadInitialData() {
      const hasCache = loadCache();

      if (hasCache) {
        renderAll(false);
        const lastSync = localStorage.getItem(CACHE_KEYS.lastSync);
        if (lastSync) {
          showToast(`Cargado desde caché local`);
        }
      }

      try {
        setLoading(true, hasCache ? "Sincronizando con Sheets..." : "Conectando con Sheets...");
        const [clients, userDefaults] = await Promise.all([
          apiGet("list"),
          apiGet("getuserdefaults")
        ]);

        state.clients = sortAndRecalculateOrders((clients || []).map(normalizeClient));
        state.userDefaults = { ...DEFAULT_USER, ...(userDefaults || {}) };
        saveCache();

        renderAll(false);
        showToast(`Base conectada: ${state.clients.length}`);
      } catch (error) {
        console.error(error);
        renderAll(false);
        showToast(hasCache ? "Mostrando datos guardados localmente" : (error.message || "No se pudo conectar con Sheets"));
      } finally {
        setLoading(false);
      }
    }

    function setLoading(isLoading, message = "Procesando...") {
      state.loading = isLoading;
      addClientForm.querySelectorAll("input, select, textarea, button").forEach(el => el.disabled = isLoading);
      editForm.querySelectorAll("input, select, textarea, button").forEach(el => el.disabled = isLoading);
      exportExcelBtn.disabled = isLoading;
      if (isLoading) {
        clientSearchInfo.textContent = message;
      }
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      clearTimeout(showToast._timer);
      showToast._timer = setTimeout(() => {
        toast.classList.remove("show");
      }, 2600);
    }

    function openModal(id) {
      document.getElementById(id).classList.add("show");
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove("show");
    }

    function switchTab(tab) {
      state.activeTab = tab;
      document.querySelectorAll(".screen").forEach(el => el.classList.remove("active"));
      document.getElementById(`screen-${tab}`).classList.add("active");
      document.querySelectorAll(".nav-btn").forEach(btn => btn.classList.toggle("active", btn.dataset.tab === tab));
    }

    function getFilteredClients() {
      const term = normalizeText(state.clientSearch).toLowerCase();
      if (!term) return state.clients;

      return state.clients.filter(client => {
        const nombre = normalizeText(client.nombre_negocio).toLowerCase();
        const codigo = normalizeText(client.codigo).toLowerCase();
        const dia = normalizeText(client.dia_visita).toLowerCase();
        const ruta = normalizeText(client.ruta).toLowerCase();
        return nombre.includes(term) || codigo.includes(term) || dia.includes(term) || ruta.includes(term);
      });
    }

    function renderClients() {
      if (!state.clients.length) {
        clientSearchInfo.textContent = state.loading ? "Conectando..." : "Sin clientes registrados";
        clientList.innerHTML = `<div class="info-box" style="margin:0;">${state.loading ? "Cargando datos desde Google Sheets..." : "Sin clientes."}</div>`;
        return;
      }

      const filteredClients = getFilteredClients();
      const term = normalizeText(state.clientSearch);

      if (term) {
        clientSearchInfo.textContent = filteredClients.length
          ? `${filteredClients.length} resultado${filteredClients.length === 1 ? "" : "s"} para "${term}"`
          : `Sin resultados para "${term}"`;
      } else {
        clientSearchInfo.textContent = `${state.clients.length} cliente${state.clients.length === 1 ? "" : "s"} en total`;
      }

      if (!filteredClients.length) {
        clientList.innerHTML = `<div class="info-box" style="margin:0;">No se encontraron clientes.</div>`;
        return;
      }

      clientList.innerHTML = filteredClients.map(client => `
        <div class="client-item">
          <div class="pill-row">
            <span class="pill">Ruta ${escapeHtml(client.ruta)}</span>
            <span class="pill">Orden ${client.orden}</span>
            <span class="pill">${escapeHtml(client.dia_visita)}</span>
          </div>
          <h3 class="client-name">${escapeHtml(client.nombre_negocio)}</h3>
          <p class="client-meta">Código: ${escapeHtml(client.codigo)} · Centro: ${escapeHtml(client.centro)} · Agencia: ${escapeHtml(client.agencia)}</p>
          <p class="client-address">${escapeHtml(client.direccion)}</p>
          <p class="client-class">Clasificación: ${escapeHtml(client.clasificacion)} · Promotora: ${escapeHtml(client.promotora)}</p>
          <div class="client-actions">
            <button class="btn btn-secondary" onclick="openEditClient('${client.id}')">✏️ Editar</button>
            <button class="btn btn-danger" onclick="deleteClient('${client.id}')">🗑 Borrar</button>
          </div>
        </div>
      `).join("");
    }

    function renderSummary() {
      const totalClientes = state.clients.length;
      const porRutaMap = new Map();
      const now = new Date();
      const month = now.getMonth();
      const year = now.getFullYear();
      let nuevosMes = 0;

      state.clients.forEach(client => {
        const ruta = client.ruta || "Sin ruta";
        porRutaMap.set(ruta, (porRutaMap.get(ruta) || 0) + 1);

        if (client.createdAt) {
          const d = new Date(client.createdAt);
          if (d.getMonth() === month && d.getFullYear() === year && client.isNew) nuevosMes += 1;
        }
      });

      totalClientesEl.textContent = totalClientes;
      nuevosMesEl.textContent = nuevosMes;

      const porRuta = Array.from(porRutaMap.entries()).sort((a, b) => a[0].localeCompare(b[0], undefined, { numeric: true }));
      routeList.innerHTML = porRuta.length
        ? porRuta.map(([ruta, total]) => `<div class="route-item"><span>Ruta ${escapeHtml(ruta)}</span><strong>${total}</strong></div>`).join("")
        : `<p class="client-meta" style="margin:0;">Sin datos.</p>`;
    }

    function renderUserDefaults() {
      document.getElementById("user_centro").value = state.userDefaults.centro || "";
      document.getElementById("user_agencia").value = state.userDefaults.agencia || "";
      document.getElementById("user_distrito").value = state.userDefaults.distrito || "";
      document.getElementById("user_promotora").value = state.userDefaults.promotora || "";
    }

    function renderAll(repaint = true) {
      renderClients();
      renderSummary();
      renderUserDefaults();
      if (repaint) renderClients();
    }

    function validateClientForm(data) {
      if (!normalizeText(data.codigo)) return "Ingresa código";
      if (!normalizeText(data.ruta)) return "Ingresa ruta";
      if (!normalizeText(data.dia_visita)) return "Selecciona un día";
      if (!normalizeText(data.nombre_negocio)) return "Ingresa negocio";
      if (!normalizeText(data.direccion)) return "Ingresa dirección";
      if (!normalizeText(data.clasificacion)) return "Ingresa clasificación";
      return "";
    }

    function escapeHtml(str) {
      return String(str ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function openEditClient(id) {
      const client = state.clients.find(item => item.id === id);
      if (!client) return;
      state.editId = id;
      document.getElementById("edit_id").value = client.id;
      document.getElementById("edit_codigo").value = client.codigo;
      document.getElementById("edit_ruta").value = client.ruta;
      document.getElementById("edit_dia_visita").value = client.dia_visita;
      document.getElementById("edit_nombre_negocio").value = client.nombre_negocio;
      document.getElementById("edit_direccion").value = client.direccion;
      document.getElementById("edit_clasificacion").value = client.clasificacion;
      openModal("editModal");
    }
    window.openEditClient = openEditClient;

    async function deleteClient(id) {
      const confirmado = window.confirm("¿Estás seguro que deseas borrar este cliente?");
      if (!confirmado) return;

      try {
        setLoading(true, "Eliminando...");
        const clients = await apiPost({ action: "delete", id });
        state.clients = sortAndRecalculateOrders((clients || []).map(normalizeClient));
        saveCache();
        if (state.editId === id) closeModal("editModal");
        renderAll(false);
        showToast("Cliente eliminado");
      } catch (error) {
        console.error(error);
        showToast(error.message || "No se pudo eliminar");
      } finally {
        setLoading(false);
      }
    }
    window.deleteClient = deleteClient;

    function exportToExcel(clients) {
      const getDayIndex = (day) => {
        const normalizedDay = normalizeText(day)
          .toLowerCase()
          .normalize("NFD")
          .replace(/[\u0300-\u036f]/g, "");

        const cleanDay = normalizedDay.includes("-")
          ? normalizedDay.split("-").slice(1).join("-").trim()
          : normalizedDay;

        const dayMap = {
          lunes: 0,
          martes: 1,
          miercoles: 2,
          jueves: 3,
          viernes: 4,
          sabado: 5,
          domingo: 6
        };

        if (cleanDay in dayMap) return dayMap[cleanDay];
        if (normalizedDay in dayMap) return dayMap[normalizedDay];
        return 999;
      };

      const exportClients = [...clients].sort((a, b) => {
        const routeCompare = normalizeText(a.ruta).localeCompare(normalizeText(b.ruta), undefined, { numeric: true });
        if (routeCompare !== 0) return routeCompare;

        const dayCompare = getDayIndex(a.dia_visita) - getDayIndex(b.dia_visita);
        if (dayCompare !== 0) return dayCompare;

        const orderCompare = Number(a.orden || 0) - Number(b.orden || 0);
        if (orderCompare !== 0) return orderCompare;

        return normalizeText(a.nombre_negocio).localeCompare(normalizeText(b.nombre_negocio));
      });

      const rows = exportClients.map((item) => ({
        Codigo: item.codigo,
        Centro: item.centro,
        Agencia: item.agencia,
        Distrito: item.distrito,
        Ruta: item.ruta,
        Dia_visita: item.dia_visita,
        Orden: item.orden,
        Nombre_Negocio: item.nombre_negocio,
        Direccion: item.direccion,
        Clasificacion: item.clasificacion,
        Promotora: item.promotora
      }));

      const HEADER_LABELS = {
        Codigo: "CODIGO SIMPLE",
        Centro: "CENTRO",
        Agencia: "AGENCIA ACTUAL",
        Distrito: "DISTRITO",
        Ruta: "RUTA ACTUAL",
        Dia_visita: "DIA VISITA",
        Orden: "ORDEN",
        Nombre_Negocio: "NOMBRE NEGOCIO",
        Direccion: "DIRECCION",
        Clasificacion: "CLASIFICACION PDV",
        Promotora: "NOMBRE PROMOTORA VISIBILIDAD"
      };

      const sheetData = [
        REQUIRED_EXPORT_COLUMNS.map((key) => HEADER_LABELS[key] || String(key).toUpperCase()),
        ...rows.map((row) => REQUIRED_EXPORT_COLUMNS.map((key) => row[key] ?? ""))
      ];

      const worksheet = XLSX.utils.aoa_to_sheet(sheetData);
      const workbook = XLSX.utils.book_new();

      const redColumns = new Set(["Codigo"]);
      const centerColumns = new Set(["Codigo", "Centro", "Agencia", "Distrito", "Ruta", "Dia_visita", "Orden", "Clasificacion"]);
      const borderColor = "B7C3CC";
      const headerBlue = "B7D7E5";
      const headerRed = "FF1A12";
      const headerTextDark = "111827";
      const headerTextLight = "FFFFFF";

      const range = XLSX.utils.decode_range(
        worksheet["!ref"] || `A1:${XLSX.utils.encode_cell({ r: 0, c: REQUIRED_EXPORT_COLUMNS.length - 1 })}`
      );

      const getTextLength = (value) => {
        if (value == null) return 0;
        return String(value)
          .split(/\r?\n/)
          .reduce((max, line) => Math.max(max, line.length), 0);
      };

      const makeBorder = (rgb) => ({
        top: { style: "thin", color: { rgb } },
        right: { style: "thin", color: { rgb } },
        bottom: { style: "thin", color: { rgb } },
        left: { style: "thin", color: { rgb } }
      });

      for (let col = range.s.c; col <= range.e.c; col++) {
        const headerAddress = XLSX.utils.encode_cell({ r: 0, c: col });
        const headerCell = worksheet[headerAddress];
        const key = REQUIRED_EXPORT_COLUMNS[col] || "";
        const isRed = redColumns.has(key);

        if (headerCell) {
          headerCell.s = {
            font: {
              bold: true,
              color: { rgb: isRed ? headerTextLight : headerTextDark },
              sz: 12,
              name: "Arial"
            },
            fill: { fgColor: { rgb: isRed ? headerRed : headerBlue } },
            alignment: {
              horizontal: "center",
              vertical: "center",
              wrapText: true
            },
            border: makeBorder(borderColor)
          };
        }

        for (let rowIndex = 1; rowIndex <= range.e.r; rowIndex++) {
          const cellAddress = XLSX.utils.encode_cell({ r: rowIndex, c: col });
          const cell = worksheet[cellAddress];
          if (!cell) continue;

          cell.s = {
            font: {
              color: { rgb: "1F2937" },
              sz: 11,
              name: "Arial"
            },
            fill: { fgColor: { rgb: rowIndex % 2 === 0 ? "FFFFFF" : "F8FAFC" } },
            alignment: {
              horizontal: centerColumns.has(key) ? "center" : "left",
              vertical: "center",
              wrapText: true
            },
            border: makeBorder("D5DEE5")
          };
        }
      }

      worksheet["!rows"] = [{ hpt: 34 }, ...rows.map(() => ({ hpt: 22 }))];
      worksheet["!autofilter"] = { ref: worksheet["!ref"] };
      worksheet["!cols"] = REQUIRED_EXPORT_COLUMNS.map((key) => {
        const headerLength = getTextLength(HEADER_LABELS[key] || key);
        const maxContentLength = rows.reduce((max, row) => Math.max(max, getTextLength(row[key])), 0);
        const largest = Math.max(headerLength, maxContentLength);

        if (key === "Direccion") return { wch: Math.min(Math.max(largest + 4, 20), 42) };
        if (key === "Nombre_Negocio") return { wch: Math.min(Math.max(largest + 4, 18), 30) };
        if (key === "Promotora") return { wch: Math.min(Math.max(largest + 4, 20), 28) };
        return { wch: Math.min(Math.max(largest + 3, 12), 22) };
      });

      XLSX.utils.book_append_sheet(workbook, worksheet, "EXELdatos");
      XLSX.writeFile(workbook, `EXELdatos_${new Date().toISOString().slice(0, 10)}.xlsx`);
    }

    document.getElementById("openSettingsBtn").addEventListener("click", () => openModal("settingsModal"));
    document.getElementById("openUserModalBtn").addEventListener("click", () => {
      closeModal("settingsModal");
      openModal("userModal");
    });

    document.querySelectorAll("[data-close]").forEach(btn => {
      btn.addEventListener("click", () => closeModal(btn.dataset.close));
    });

    document.querySelectorAll(".modal").forEach(modal => {
      modal.addEventListener("click", (e) => {
        if (e.target === modal) modal.classList.remove("show");
      });
    });

    document.querySelectorAll(".nav-btn").forEach(btn => {
      btn.addEventListener("click", () => switchTab(btn.dataset.tab));
    });

    clientSearchInput.addEventListener("input", (e) => {
      state.clientSearch = e.target.value;
      renderClients();
    });

    document.getElementById("userForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const userDefaults = {
        centro: normalizeText(document.getElementById("user_centro").value),
        agencia: normalizeText(document.getElementById("user_agencia").value),
        distrito: normalizeText(document.getElementById("user_distrito").value),
        promotora: normalizeText(document.getElementById("user_promotora").value)
      };

      try {
        setLoading(true, "Guardando usuario...");
        const saved = await apiPost({
          action: "saveuserdefaults",
          userDefaults
        });
        state.userDefaults = { ...DEFAULT_USER, ...(saved || userDefaults) };
        saveCache();
        renderUserDefaults();
        closeModal("userModal");
        showToast("Usuario guardado");
      } catch (error) {
        console.error(error);
        showToast(error.message || "No se pudo guardar usuario");
      } finally {
        setLoading(false);
      }
    });

    document.getElementById("addClientForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const data = {
        codigo: document.getElementById("codigo").value,
        ruta: document.getElementById("ruta").value,
        dia_visita: document.getElementById("dia_visita").value,
        nombre_negocio: document.getElementById("nombre_negocio").value,
        direccion: document.getElementById("direccion").value,
        clasificacion: document.getElementById("clasificacion").value
      };

      const error = validateClientForm(data);
      if (error) {
        showToast(error);
        return;
      }

      const newClient = {
        codigo: data.codigo,
        centro: state.userDefaults.centro,
        agencia: state.userDefaults.agencia,
        distrito: state.userDefaults.distrito,
        ruta: data.ruta,
        dia_visita: data.dia_visita,
        nombre_negocio: data.nombre_negocio,
        direccion: data.direccion,
        clasificacion: data.clasificacion,
        promotora: state.userDefaults.promotora,
        orden: Number.MAX_SAFE_INTEGER
      };

      try {
        setLoading(true, "Guardando cliente...");
        const clients = await apiPost({
          action: "add",
          client: newClient
        });

        state.clients = sortAndRecalculateOrders((clients || []).map(normalizeClient));
        saveCache();
        renderAll(false);
        e.target.reset();
        document.getElementById("dia_visita").value = "1-Lunes";
        showToast("Cliente agregado");
      } catch (error) {
        console.error(error);
        showToast(error.message || "No se pudo agregar");
      } finally {
        setLoading(false);
      }
    });

    document.getElementById("editForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const updated = {
        id: document.getElementById("edit_id").value,
        codigo: document.getElementById("edit_codigo").value,
        ruta: document.getElementById("edit_ruta").value,
        dia_visita: document.getElementById("edit_dia_visita").value,
        nombre_negocio: document.getElementById("edit_nombre_negocio").value,
        direccion: document.getElementById("edit_direccion").value,
        clasificacion: document.getElementById("edit_clasificacion").value
      };

      const error = validateClientForm(updated);
      if (error) {
        showToast(error);
        return;
      }

      try {
        setLoading(true, "Actualizando cliente...");
        const clients = await apiPost({
          action: "update",
          client: updated
        });

        state.clients = sortAndRecalculateOrders((clients || []).map(normalizeClient));
        saveCache();
        renderAll(false);
        closeModal("editModal");
        showToast("Cliente actualizado");
      } catch (error) {
        console.error(error);
        showToast(error.message || "No se pudo actualizar");
      } finally {
        setLoading(false);
      }
    });

    document.getElementById("deleteClientBtn").addEventListener("click", async () => {
      const id = document.getElementById("edit_id").value;
      if (!id) return;
      await deleteClient(id);
    });

    document.getElementById("exportExcelBtn").addEventListener("click", () => {
      exportToExcel(state.clients);
    });

    renderAll(false);
    switchTab("registro");
    document.getElementById("dia_visita").value = "1-Lunes";
    loadInitialData();
  </script>
</body>
</html>
